name: Draft release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run release:check
      - name: Verify release metadata
        run: node scripts/verify-release.mjs "$GITHUB_REF_NAME"
      - name: Attest release build
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/main.js
            styles.css
      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --draft \
            dist/main.js \
            manifest.json \
            styles.css
