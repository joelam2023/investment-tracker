name: Bug report
description: Report a reproducible problem using synthetic or fully redacted data.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        You may write this report in any language.

        Do not upload real ledger files, exports, recovery keys, passwords, account names, balances, transaction dates, or unredacted screenshots.
  - type: input
    id: version
    attributes:
      label: Plugin version
    validations:
      required: true
  - type: input
    id: obsidian
    attributes:
      label: Obsidian version and platform
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce with synthetic data
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostic information (optional)
      description: Paste the text produced by Investment Tracker's "Copy diagnostic information" button. Review it before submitting. Do not paste ledger data or unrelated logs.
      placeholder: |
        Plugin version:
        Obsidian version:
        Platform:
        Interface language:
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed all real financial data, credentials, and identifying screenshots.
          required: true
